# HTTP — redirect all traffic to HTTPS
server {
    listen 80;
    server_name netizen9.com www.netizen9.com;
    return 301 https://$host$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl;
    server_name netizen9.com www.netizen9.com;

    # SSL certificates (issued by certbot)
    ssl_certificate     /etc/letsencrypt/live/netizen9.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netizen9.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Admin API — localhost only
    location /api/admin/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Admin UI — localhost only (SPA; serves index.html so React Router handles /admin)
    location ~ ^/ai/admin {
        allow 127.0.0.1;
        deny all;
        alias /home/vps3ct/projects/aitrends-webapp/frontend/dist/;
        index index.html;
        try_files $uri /ai/index.html;
    }

    # Proxy /api/* to FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy FastAPI docs
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve React SPA at /ai/
    location /ai/ {
        alias /home/vps3ct/projects/aitrends-webapp/frontend/dist/;
        index index.html;
        # SPA fallback — unknown sub-paths serve index.html
        try_files $uri $uri/ /ai/index.html;
    }

    # Redirect bare /ai to /ai/
    location = /ai {
        return 301 /ai/;
    }

    # Cache static assets under /ai/
    location ~* ^/ai/(.+\.(js|css|png|svg|ico|woff2))$ {
        alias /home/vps3ct/projects/aitrends-webapp/frontend/dist/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Root redirect to /ai/
    location = / {
        return 301 /ai/;
    }
}
